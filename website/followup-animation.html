<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunBy AI — Follow-Up & Invoice Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark: #0a0a14;
    --dark-2: #0f0f1e;
    --dark-3: #141428;
    --dark-4: #1a1a32;
    --accent: #e94560;
    --accent-soft: rgba(233, 69, 96, 0.1);
    --blue: #4361ee;
    --blue-soft: rgba(67, 97, 238, 0.1);
    --white: #ffffff;
    --gray: #8b8b9e;
    --gray-light: #a5a5b8;
    --text: #c8c8d8;
    --green: #10b981;
    --green-soft: rgba(16, 185, 129, 0.1);
    --orange: #f59e0b;
    --orange-soft: rgba(245, 158, 11, 0.1);
    --border: rgba(255, 255, 255, 0.06);
    --border-hover: rgba(255, 255, 255, 0.12);
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--dark);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .ambient {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(100px);
  }
  .ambient-1 {
    top: -5%; left: 15%;
    background: rgba(67, 97, 238, 0.06);
    animation: drift 14s ease-in-out infinite alternate;
  }
  .ambient-2 {
    bottom: -5%; right: 15%;
    background: rgba(233, 69, 96, 0.05);
    animation: drift 18s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift {
    from { transform: translate(0,0); }
    to { transform: translate(20px, -15px); }
  }

  /* ─── LAYOUT ─── */
  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 520px;
    max-width: 95vw;
  }

  .brand {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.03em;
    margin-bottom: 0.3rem;
    animation: fadeIn 0.8s ease-out 0.2s both;
  }
  .brand span { color: var(--accent); }

  .brand-sub {
    font-size: 0.82rem;
    color: var(--gray);
    margin-bottom: 1.8rem;
    animation: fadeIn 0.8s ease-out 0.4s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── LAPTOP MOCKUP ─── */
  .laptop {
    position: relative;
    width: 100%;
    animation: laptopAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
  }

  @keyframes laptopAppear {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .laptop-screen {
    background: var(--dark-2);
    border: 1px solid var(--border-hover);
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.4),
      0 0 60px rgba(233, 69, 96, 0.04);
  }

  /* Browser chrome */
  .browser-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--dark-3);
    border-bottom: 1px solid var(--border);
  }

  .browser-dots {
    display: flex;
    gap: 5px;
  }
  .browser-dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .browser-dots span:nth-child(1) { background: #ff5f57; }
  .browser-dots span:nth-child(2) { background: #febc2e; }
  .browser-dots span:nth-child(3) { background: #28c840; }

  .browser-url {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.68rem;
    color: var(--gray);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .browser-url svg { width: 10px; height: 10px; color: var(--green); flex-shrink: 0; }

  /* Email client layout */
  .email-client {
    display: flex;
    min-height: 420px;
  }

  /* Sidebar */
  .email-sidebar {
    width: 180px;
    background: var(--dark-3);
    border-right: 1px solid var(--border);
    padding: 12px;
    flex-shrink: 0;
  }

  .sidebar-compose {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px;
    width: 100%;
    font-size: 0.72rem;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .sidebar-compose svg { width: 12px; height: 12px; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    font-size: 0.72rem;
    color: var(--gray);
    cursor: default;
    transition: background 0.2s;
  }
  .sidebar-item.active {
    background: rgba(255,255,255,0.04);
    color: var(--white);
  }
  .sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .sidebar-item .count {
    margin-left: auto;
    font-size: 0.65rem;
    background: var(--accent);
    color: white;
    padding: 1px 5px;
    border-radius: 10px;
    font-weight: 700;
  }

  /* Email content area */
  .email-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Email header bar */
  .email-header-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .email-header-bar h3 {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--white);
  }
  .email-header-bar .email-count {
    font-size: 0.68rem;
    color: var(--gray);
  }

  /* Email thread */
  .email-thread {
    flex: 1;
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Individual email */
  .email-msg {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    transform: translateY(15px);
  }

  .email-msg-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .email-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.7rem;
    flex-shrink: 0;
  }

  .email-avatar.ai {
    background: linear-gradient(135deg, var(--accent), #c23152);
    color: white;
  }
  .email-avatar.client {
    background: var(--blue-soft);
    color: var(--blue);
  }

  .email-sender {
    flex: 1;
  }
  .email-sender-name {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--white);
  }
  .email-sender-addr {
    font-size: 0.62rem;
    color: var(--gray);
  }
  .email-time {
    font-size: 0.62rem;
    color: var(--gray);
    flex-shrink: 0;
  }

  .email-body {
    padding-left: 40px;
    font-size: 0.75rem;
    line-height: 1.65;
    color: var(--text);
  }

  .email-body p {
    margin-bottom: 6px;
  }

  .email-body .greeting { color: var(--white); font-weight: 500; }
  .email-body .sign-off { color: var(--gray); font-style: italic; margin-top: 4px; }

  /* Invoice card inside email */
  .invoice-card {
    background: var(--dark-4);
    border: 1px solid var(--border-hover);
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .invoice-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .invoice-label {
    font-size: 0.62rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .invoice-amount {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .invoice-due {
    font-size: 0.65rem;
    color: var(--orange);
    font-weight: 500;
  }

  .invoice-pay-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 0.7rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .invoice-pay-btn svg { width: 12px; height: 12px; }

  /* Booking card */
  .booking-card {
    background: var(--dark-4);
    border: 1px solid var(--border-hover);
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
  }

  .booking-slots {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .booking-slot {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-hover);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.68rem;
    color: var(--text);
    font-weight: 500;
    transition: all 0.2s;
  }
  .booking-slot.selected {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  .booking-label {
    font-size: 0.65rem;
    color: var(--gray);
    margin-bottom: 4px;
  }

  /* Confirmation badge */
  .confirm-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--green-soft);
    border: 1px solid rgba(16, 185, 129, 0.2);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.68rem;
    color: var(--green);
    font-weight: 600;
    margin-top: 6px;
  }
  .confirm-badge svg { width: 12px; height: 12px; }

  /* Payment confirmed badge */
  .payment-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--green-soft);
    border: 1px solid rgba(16, 185, 129, 0.2);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.68rem;
    color: var(--green);
    font-weight: 600;
    margin-top: 6px;
  }
  .payment-badge svg { width: 12px; height: 12px; }

  /* Laptop base */
  .laptop-base {
    height: 14px;
    background: linear-gradient(180deg, var(--dark-3), var(--dark-2));
    border-radius: 0 0 12px 12px;
    border: 1px solid var(--border-hover);
    border-top: none;
    position: relative;
  }
  .laptop-base::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
  }

  /* Floating notification badges */
  .notif-badge {
    position: absolute;
    background: rgba(15, 15, 30, 0.92);
    border: 1px solid var(--border-hover);
    border-radius: 10px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    font-weight: 600;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    opacity: 0;
    z-index: 10;
    white-space: nowrap;
  }
  .notif-badge svg { width: 14px; height: 14px; flex-shrink: 0; }

  .notif-badge.badge-paid {
    top: 5%;
    right: -12%;
    color: var(--green);
  }
  .notif-badge.badge-booked {
    bottom: 20%;
    left: -12%;
    color: var(--accent);
  }
  .notif-badge.badge-reminder {
    top: 35%;
    left: -15%;
    color: var(--orange);
  }

  /* Tagline */
  .tagline {
    margin-top: 1.5rem;
    font-size: 0.82rem;
    color: var(--gray);
    text-align: center;
    animation: fadeIn 0.8s ease-out 0.8s both;
  }
  .tagline strong { color: var(--white); font-weight: 600; }

  /* ─── ANIMATION CLASSES ─── */
  .anim-in {
    animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .anim-out {
    animation: slideOut 0.35s ease-in forwards;
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-8px); }
  }

  .badge-in {
    animation: badgeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes badgeIn {
    from { opacity: 0; transform: translateY(8px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .badge-float {
    animation: badgeFloat 3s ease-in-out infinite alternate;
  }
  @keyframes badgeFloat {
    from { transform: translateY(0); }
    to { transform: translateY(-5px); }
  }

  .badge-out {
    animation: badgeOut 0.3s ease-in forwards;
  }
  @keyframes badgeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  /* Typing shimmer */
  .typing-shimmer {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    padding: 4px 0;
  }
  .typing-shimmer .dot {
    width: 5px; height: 5px;
    background: var(--gray);
    border-radius: 50%;
    animation: shimmer 1.2s ease-in-out infinite;
  }
  .typing-shimmer .dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-shimmer .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes shimmer {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  /* Responsive */
  @media (max-width: 560px) {
    .email-sidebar { width: 40px; padding: 8px 6px; }
    .sidebar-compose span, .sidebar-item span:not(.count) { display: none; }
    .sidebar-compose { padding: 8px 4px; }
    .notif-badge { display: none; }
    .email-body { padding-left: 0; }
  }
</style>
</head>

          time: '10:41 AM',
          body: `<p>You're booked! Friday, March 14 at 11:00 AM for a HydraFacial.</p>

  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>

</div>

          badge: 'badge-booked',
        },
        {
          avatar: 'client',
          avatarText: 'J',
          name: 'Jessica M.',
          addr: 'jessica.m@gmail.com',
          time: '10:43 AM',
          body: `<p>Amazing, can't wait! You guys make it so easy to book.</p>`,
        },
      ]
    },
  ];

  // ─── ENGINE ───
  const threadEl = document.getElementById('email-thread');
  const threadTitle = document.getElementById('thread-title');
  const threadCount = document.getElementById('thread-count');
  const sentCount = document.getElementById('sent-count');
  let currentScenario = 0;
  let sentTotal = 3;

  function createEmailEl(email) {
    const el = document.createElement('div');
    el.className = 'email-msg';

    el.innerHTML = `
      <div class="email-msg-header">
        <div class="email-avatar ${email.avatar}">${email.avatarText}</div>
        <div class="email-sender">
          <div class="email-sender-name">${email.name}</div>
          <div class="email-sender-addr">${email.addr}</div>
        </div>
        <div class="email-time">${email.time}</div>
      </div>
      <div class="email-body">${email.body}</div>
    `;
    return el;
  }

  function createTypingEl() {
    const el = document.createElement('div');
    el.className = 'email-msg';
    el.innerHTML = `
      <div class="email-msg-header">
        <div class="email-avatar ai">R</div>
        <div class="email-sender">
          <div class="email-sender-name">RunBy AI</div>
          <div class="email-sender-addr">composing...</div>
        </div>
      </div>
      <div class="email-body">
        <div class="typing-shimmer"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    `;
    return el;
  }

  function showBadge(id) {
    const badge = document.getElementById(id);
    badge.classList.remove('badge-out');
    badge.classList.add('badge-in');
    setTimeout(() => badge.classList.add('badge-float'), 500);
  }

  function hideBadges() {
    ['badge-paid', 'badge-booked', 'badge-reminder'].forEach(id => {
      const badge = document.getElementById(id);
      badge.classList.remove('badge-in', 'badge-float');
      badge.classList.add('badge-out');
    });
  }

  function clearThread() {
    return new Promise(resolve => {
      const children = Array.from(threadEl.children);
      if (!children.length) return resolve();

      children.forEach((el, i) => {
        setTimeout(() => el.classList.add('anim-out'), i * 50);
      });

      hideBadges();

      setTimeout(() => {
        threadEl.innerHTML = '';
        resolve();
      }, children.length * 50 + 400);
    });
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function playScenario(scenario) {
    threadTitle.textContent = scenario.threadTitle;
    threadCount.textContent = `${scenario.emails.length} messages`;

    for (let i = 0; i < scenario.emails.length; i++) {
      const email = scenario.emails[i];

      // Show typing for AI messages (not the first one)
      if (email.avatar === 'ai' && i > 0) {
        const typing = createTypingEl();
        threadEl.appendChild(typing);
        setTimeout(() => typing.classList.add('anim-in'), 50);
        threadEl.scrollTop = threadEl.scrollHeight;
        await sleep(1500);
        typing.classList.add('anim-out');
        await sleep(350);
        typing.remove();
      }

      // Add the email
      const el = createEmailEl(email);
      threadEl.appendChild(el);
      await sleep(80);
      el.classList.add('anim-in');
      threadEl.scrollTop = threadEl.scrollHeight;

      // Show badge if specified
      if (email.badge) {
        await sleep(400);
        showBadge(email.badge);
      }

      // Update sent count for AI messages
      if (email.avatar === 'ai') {
        sentTotal++;
        sentCount.textContent = sentTotal;
      }

      // Pause before next message
      await sleep(2200);
    }
  }

  async function runLoop() {
    while (true) {
      const scenario = scenarios[currentScenario % scenarios.length];
      await playScenario(scenario);
      await sleep(5000);
      await clearThread();
      await sleep(1200);
      currentScenario++;
    }
  }

  setTimeout(runLoop, 1000);
</script>
